<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍹 Бар для коллег</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #2C1810 0%, #5C3A2E 50%, #1A0F0A 100%);
            min-height: 100vh;
            padding: 20px;
            color: #E8D5C4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: rgba(44, 24, 16, 0.9);
            border: 1px solid rgba(139, 105, 80, 0.3);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 28px;
            color: #F5E6D3;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #D4C4B0;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        button {
            background: #8B6914;
            color: #FFF8DC;
            border: 1px solid #A67C00;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            background: #A67C00;
            transform: translateY(-2px);
        }

        .btn-staff {
            background: #6B4C1A !important;
            border: 1px solid #8B6914 !important;
        }

        .btn-staff:hover {
            background: #8B6914 !important;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(139, 105, 80, 0.5);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(44, 24, 16, 0.6);
            color: #F5E6D3;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #A67C00;
        }

        input::placeholder {
            color: #9C8877;
        }

        .drink-card {
            background: rgba(60, 42, 34, 0.8);
            border: 1px solid rgba(139, 105, 80, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .drink-name {
            font-size: 24px;
            font-weight: 700;
            color: #F5E6D3 !important;
            margin-bottom: 16px;
            border-left: 4px solid #A67C00;
            padding-left: 12px;
        }

        .section-title {
            font-weight: 600;
            color: #E8D5C4 !important;
            margin: 12px 0 8px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ingredients {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .ingredient-tag {
            background: rgba(139, 105, 80, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #F5E6D3 !important;
            border: 1px solid rgba(166, 124, 0, 0.3);
        }

        .instruction {
            color: #E8D5C4 !important;
            line-height: 1.6;
            font-size: 15px;
        }

        .stats {
            text-align: center;
            color: #D4C4B0;
            font-size: 14px;
            margin-top: 20px;
        }

        .error {
            background: rgba(180, 50, 50, 0.3);
            color: #FFB3B3;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid rgba(180, 50, 50, 0.5);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #E8D5C4;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0;
            }

            .card {
                padding: 20px;
            }

            button {
                padding: 10px 16px;
                font-size: 14px;
            }

            .search-box {
                flex-wrap: wrap;
            }

            .search-box input,
            .search-box button {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>
            <span>🍹</span>
            Бар для коллег
        </h1>
        <div class="subtitle">Найди идеальный напиток или открой что-то новое</div>

        <div class="button-group">
            <button onclick="getRandomDrink()">🎲 Случайный</button>
            <button onclick="showAllDrinks()">📋 Все напитки</button>
            <button onclick="staffLogin()" style="background: #8B6914; color: #FFF8DC; border: 1px solid #A67C00;">🔐 Раскладки</button>
        </div>

        <div class="search-box">
            <input type="text" id="ingredientInput" placeholder="🔍 Поиск: Negroni, ром..."
                   onkeypress="if(event.key === 'Enter') searchByIngredient()">
            <button onclick="searchByIngredient()">Найти</button>
        </div>
    </div>

    <div id="result"></div>
    <div id="stats" class="stats"></div>
</div>

<script>
        // 🔐 Простая авторизация
    async function staffLogin() {
        const password = prompt('🔐 Введите пароль:');
        if (!password) return;

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('authToken', data.token);
                showRecipes();
            } else {
                alert('❌ ' + data.error);
            }
        } catch (e) {
            alert('⚠️ Ошибка: ' + e.message);
        }
    }

    // Показать раскладки
    async function showRecipes() {
        const token = localStorage.getItem('authToken');
        if (!token) { staffLogin(); return; }

        document.getElementById('result').innerHTML = '<div class="loading">⏳ Загрузка...</div>';

        try {
            const res = await fetch('/api/recipes', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('authToken');
                alert('🔐 Доступ запрещён');
                return;
            }

            const recipes = await res.json();
            let html = `<div class="card">
                <h3 style="margin-bottom: 16px;">📋 Раскладки коктейлей</h3>
                <div class="subtitle">Только для сотрудников</div>`;

            recipes.forEach(d => {
                const ingredients = Array.isArray(d.ingredients) ? d.ingredients : [];
                const measurements = Array.isArray(d.measurements) ? d.measurements : [];

                html += `
                    <div style="margin: 16px 0; padding: 16px; background: #f7fafc; border-radius: 12px; border-left: 4px solid #667eea;">
                        <div style="font-weight: 700; font-size: 18px; margin-bottom: 12px;">🍸 ${d.name}</div>

                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 12px; font-size: 13px;">
                            <div><strong>🥄 Метод:</strong> ${d.method}</div>
                            <div><strong>🍷 Бокал:</strong> ${d.glass}</div>
                            <div><strong>🌿 Украшение:</strong> ${d.garnish}</div>
                        </div>

                        <div style="margin-top: 12px; font-size: 14px; line-height: 2;">`;

                if (measurements.length > 0) {
                    ingredients.forEach((ing, index) => {
                        const measurement = measurements[index] || '—';
                        html += `<div>📝 ${ing} — <strong style="color: #667eea;">${measurement}</strong></div>`;
                    });
                } else {
                    ingredients.forEach(ing => {
                        html += `<div>📝 ${ing}</div>`;
                    });
                }

                html += `</div></div>`;
            });
            html += '</div>';
            document.getElementById('result').innerHTML = html;

        } catch (e) {
            document.getElementById('result').innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
        }
    }

    async function getRandomDrink() {
        showLoading();
        try {
            const response = await fetch('/api/random');
            const data = await response.json();

            if (data.error) {
                showError(data.error);
            } else {
                showDrink(data);
            }
        } catch (error) {
            showError('Ошибка загрузки: ' + error.message);
        }
    }

    async function showAllDrinks() {
        showLoading();
        try {
            const response = await fetch('/api/all');
            const drinks = await response.json();

            if (drinks.length === 0) {
                showError('Нет напитков');
            } else {
                let html = '<div class="card">';
                html += '<h3 style="margin-bottom: 16px;">📋 Все напитки (' + drinks.length + ')</h3>';
                drinks.forEach(drink => {
                    html += `
                        <div onclick='showDrinkDetails(${JSON.stringify(drink)})'
                             style="margin-bottom: 12px; padding: 12px; background: #f7fafc; border-radius: 12px; cursor: pointer;">
                            <div style="font-weight: 600;">🍸 ${drink.name}</div>
                            <div style="font-size: 12px; color: #718096;">${drink.ingredients.slice(0, 3).join(', ')}${drink.ingredients.length > 3 ? '...' : ''}</div>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('result').innerHTML = html;
            }
        } catch (error) {
            showError('Ошибка загрузки: ' + error.message);
        }
    }

    async function searchByIngredient() {
        const query = document.getElementById('ingredientInput').value.trim();
        if (!query) {
            showError('Введите название коктейля или ингредиент');
            return;
        }

        showLoading();
        try {
            // Используем параметр 'q' вместо 'ingredient'
            const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const drinks = await response.json();

            if (drinks.error) {
                showError(drinks.error);
            } else if (drinks.length === 0) {
                showError('Ничего не найдено для "' + query + '"');
            } else {
                let html = `<div class="card">`;
                html += `<h3 style="margin-bottom: 16px;">🔍 Найдено ${drinks.length} напитков по запросу "${query}"</h3>`;

                drinks.forEach(drink => {
                    const ingredients = Array.isArray(drink.ingredients) ? drink.ingredients : [];
                    html += `
                        <div onclick='showDrinkDetails(${JSON.stringify(drink).replace(/'/g, "&apos;")})'
                             style="margin-bottom: 12px; padding: 12px; background: #f7fafc; border-radius: 12px; cursor: pointer; transition: all 0.2s;"
                             onmouseover="this.style.background='#edf2f7'"
                             onmouseout="this.style.background='#f7fafc'">
                            <div style="font-weight: 700; font-size: 16px; color: #2d3748;">🍸 ${drink.name}</div>
                            <div style="font-size: 13px; color: #718096; margin-top: 4px;">
                                ${ingredients.slice(0, 4).join(', ')}${ingredients.length > 4 ? '...' : ''}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('result').innerHTML = html;
            }
        } catch (error) {
            showError('Ошибка поиска: ' + error.message);
        }
    }

    function showDrink(drink) {
        // Преобразуем массив ингредиентов в список для display
        const ingredients = Array.isArray(drink.ingredients) ? drink.ingredients : [];

        const html = `
            <div class="drink-card">
                <div class="drink-name">🍸 ${drink.name}</div>

                <div class="section-title">📝 Ингредиенты</div>
                <div class="ingredients">
                    ${ingredients.map(ing => `<span class="ingredient-tag">${ing}</span>`).join('')}
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px;">
                    <div style="background: #f7fafc; padding: 12px; border-radius: 8px;">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase;">🥄 Метод</div>
                        <div style="font-weight: 600; color: #2d3748;">${drink.method}</div>
                    </div>
                    <div style="background: #f7fafc; padding: 12px; border-radius: 8px;">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase;">🍷 Бокал</div>
                        <div style="font-weight: 600; color: #2d3748;">${drink.glass}</div>
                    </div>
                    <div style="background: #f7fafc; padding: 12px; border-radius: 8px;">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase;">🌿 Украшение</div>
                        <div style="font-weight: 600; color: #2d3748;">${drink.garnish}</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('result').innerHTML = html;
    }

    function showDrinkDetails(drink) {
        showDrink(drink);
    }

    function showLoading() {
        document.getElementById('result').innerHTML = '<div class="loading">⏳ Загрузка...</div>';
    }

    function showError(message) {
        document.getElementById('result').innerHTML = `<div class="error">⚠️ ${message}</div>`;
    }

    // Загружаем статистику при старте
    async function loadStats() {
        try {
            const response = await fetch('/api/stats');
            const stats = await response.json();
            document.getElementById('stats').innerHTML = `🍹 ${stats.total} рецептов готовы к использованию`;
        } catch (error) {
            console.error('Stats error:', error);
        }
    }

    // Показываем случайный напиток при загрузке
    loadStats();
    getRandomDrink();
</script>
</body>
</html>
